<style>
:root{
  --coral:#F2665A; --amber:#F5A94A; --ink:#33454A; --ink-soft:#5B6A6D;
  --paper:#FBF9F4; --paper-alt:#F2EDE1; --graphite:#8B9290; --line:#33454A1a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column;}
a{color:var(--coral); text-decoration:none; transition:color .2s ease;}
a:hover{color:var(--ink);}
a:focus-visible{outline:2px solid var(--coral); outline-offset:3px; border-radius:4px;}
@media (prefers-reduced-motion: reduce){*{animation-duration:.01ms!important; animation-iteration-count:1!important;}}

main{flex:1; display:flex; align-items:center; justify-content:center; padding:20px 24px 80px;}
.wrap{max-width:560px; width:100%; text-align:center;}

.logo-mark{width:clamp(120px,20vw,180px); height:auto; margin:0 auto 32px;}
.logo-mark svg{width:100%; height:auto; display:block; overflow:visible;}

.logo-mark .lg-piece{transform-box:fill-box; transform-origin:center; opacity:0; animation:lgPiece .65s cubic-bezier(.34,1.56,.64,1) both;}
.logo-mark .lg-word{opacity:1;}

.lg-butterfly{animation-delay:.05s; --sx:-38px; --sy:-22px; --sr:-35deg; --ss:.5;}
.lg-sparkle{animation-delay:.2s; --sx:30px; --sy:-30px; --sr:40deg; --ss:.5;}
.lg-loop{animation-delay:.35s; --sx:-10px; --sy:-40px; --sr:-25deg; --ss:.5;}
.lg-window{animation-delay:.5s; --sx:36px; --sy:-14px; --sr:20deg; --ss:.5;}
.lg-cloud{animation-delay:.65s; --sx:-40px; --sy:16px; --sr:-20deg; --ss:.5;}
.lg-hashtag{animation-delay:.8s; --sx:34px; --sy:24px; --sr:30deg; --ss:.5;}
.lg-heart{animation-delay:.95s; --sx:22px; --sy:34px; --sr:-30deg; --ss:.5;}
.lg-arrow{animation-delay:1.1s; --sx:-24px; --sy:30px; --sr:25deg; --ss:.5;}
.lg-badge{animation-delay:1.25s; --sx:0px; --sy:-38px; --sr:15deg; --ss:.5;}

@keyframes lgPiece{
  0%{opacity:0; transform:translate(var(--sx),var(--sy)) rotate(var(--sr)) scale(var(--ss));}
  100%{opacity:1; transform:translate(0,0) rotate(0deg) scale(1);}
}
@media (prefers-reduced-motion: reduce){
  .logo-mark .lg-piece{animation:none; opacity:1; transform:none;}
}

.eyebrow{display:inline-flex; align-items:center; gap:9px; font-weight:600; font-size:13.5px; color:var(--ink-soft); margin-bottom:26px; background:#fff; padding:8px 16px; border-radius:100px; box-shadow:0 4px 14px -6px #33454A22;}
.pulse-dots{display:inline-flex; gap:4px;}
.pulse-dots span{width:5px; height:5px; border-radius:50%; background:var(--coral); animation:blink 1.4s ease-in-out infinite;}
.pulse-dots span:nth-child(2){animation-delay:.2s;}
.pulse-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.25;} 40%{opacity:1;}}

h1{font-family:'Poppins',sans-serif; font-weight:600; font-size:clamp(28px,4vw,40px); line-height:1.2; margin-bottom:16px;}
.sub{font-size:15.5px; line-height:1.65; color:var(--ink-soft); max-width:420px; margin:0 auto 40px;}

.contact-links{display:flex; flex-direction:column; gap:12px; align-items:center;}
.contact-links a{display:inline-flex; align-items:center; gap:10px; font-weight:600; font-size:14px; color:var(--coral); padding:11px 20px; border-radius:100px; background:var(--paper-alt); transition:all .25s;}
.contact-links a:hover{background:var(--ink); color:#fff;}
.contact-links svg{width:16px; height:16px;}

footer{padding:24px; text-align:center; font-size:12.5px; color:var(--graphite);}

@media (max-width:600px){
  main{padding:10px 20px 60px;}
}
</style>
