:root{
  --coral:#F2665A; --amber:#F5A94A; --ink:#33454A; --ink-soft:#5B6A6D;

}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden;}
a{color:var(--coral); text-decoration:none; transition:color .2s ease;}
a:hover{color:var(--ink);}
a:focus-visible, button:focus-visible{outline:2px solid var(--coral); outline-offset:3px; border-radius:4px;}
@media (prefers-reduced-motion: reduce){*{animation-duration:.01ms!important; animation-iteration-count:1!important; transition-duration:.01ms!important;}}

nav{display:flex; justify-content:space-between; align-items:center; padding:22px 48px; position:relative; z-index:5;}
.nav-mark{display:inline-flex; font-family:'Poppins',sans-serif; font-weight:700; font-size:22px; color:var(--ink); letter-spacing:-0.01em; text-decoration:none;}

.icon-field{position:fixed; inset:0; z-index:1; pointer-events:none;}
.icon-field svg{position:absolute; overflow:visible; animation:gather 2.4s cubic-bezier(.5,0,.6,1) both;}
.icon-field svg:nth-child(1){animation-delay:0s;}
.icon-field svg:nth-child(2){animation-delay:.05s;}
.icon-field svg:nth-child(3){animation-delay:.1s;}
.icon-field svg:nth-child(4){animation-delay:.02s;}
.icon-field svg:nth-child(5){animation-delay:.12s;}
.icon-field svg:nth-child(6){animation-delay:.07s;}
.icon-field svg:nth-child(7){animation-delay:.04s;}
.icon-field svg:nth-child(8){animation-delay:.09s;}
.icon-field svg:nth-child(9){animation-delay:.14s;}

@keyframes gather{
  0%{opacity:0; transform:scale(.7);}
  16%{opacity:1; transform:scale(1);}
  62%{opacity:1; transform:scale(1);}
  100%{opacity:0; transform:translate(var(--gx),var(--gy)) scale(.12);}
}
@media (prefers-reduced-motion: reduce){
  .icon-field{display:none;}
}

main{flex:1; display:flex; align-items:center; justify-content:center; padding:20px 24px 80px; position:relative; z-index:2;}
.err-wrap{max-width:640px; width:100%; text-align:center;}

.err-eyebrow{display:inline-flex; align-items:center; gap:8px; font-weight:600; font-size:13.5px; color:var(--ink-soft); margin-bottom:22px; background:#fff; padding:8px 16px; border-radius:100px; box-shadow:0 4px 14px -6px #33454A22;}

.err-number-wrap{width:clamp(280px,52vw,540px); margin:0 auto 8px;}
.err-number-svg{width:100%; height:auto; display:block; overflow:visible;}
.num-ink{opacity:0; animation:revealNumber .55s cubic-bezier(.2,.8,.2,1) 2.5s both;}
@keyframes revealNumber{
  0%{opacity:0; transform:scale(.92); transform-origin:320px 130px;}
  100%{opacity:1; transform:scale(1); transform-origin:320px 130px;}
}
.fl-icon{opacity:0; animation:flIn .6s ease-out both, flBob 4s ease-in-out infinite both;}
.fl-icon.v2{animation-duration:.6s, 4.6s;}
.fl-icon.v3{animation-duration:.6s, 3.6s;}
@keyframes flIn{0%{opacity:0;} 100%{opacity:1;}}
@keyframes flBob{0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);}}
@media (prefers-reduced-motion: reduce){
  .num-ink{animation:none; opacity:1; transform:none;}
  .fl-icon{animation:flIn .01ms linear forwards; opacity:1;}
}

h1{font-family:'Poppins',sans-serif; font-weight:600; font-size:clamp(24px,3vw,32px); line-height:1.25; margin-bottom:14px;}
.err-sub{font-size:15.5px; line-height:1.65; color:var(--ink-soft); max-width:440px; margin:0 auto 36px;}

.err-cta{display:flex; gap:14px; align-items:center; justify-content:center; flex-wrap:wrap; margin-bottom:52px;}
.btn{font-weight:600; font-size:14px; padding:14px 26px; border-radius:100px; text-decoration:none; transition:all .25s; display:inline-flex; align-items:center; gap:8px; border:none; cursor:pointer;}
.btn.filled{background:var(--coral); color:#fff;}
.btn.filled:hover{background:var(--ink); color:#fff; transform:translateY(-2px);}
.btn.outline{border:1.5px solid var(--coral); background:rgba(242,102,90,0.08); color:var(--coral);}
.btn.outline:hover{background:rgba(242,102,90,0.18); color:var(--coral); transform:translateY(-2px);}

.err-more{padding-top:32px; border-top:1px solid var(--line);}
.err-more-label{font-size:12.5px; font-weight:600; color:var(--graphite); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:16px;}
.err-links{display:flex; flex-wrap:wrap; gap:10px; justify-content:center;}
.err-links a{
  font-size:13px; font-weight:600; color:var(--ink); background:var(--paper-alt);
  padding:9px 16px; border-radius:100px; transition:all .2s ease;
}
.err-links a:hover{background:var(--ink); color:#fff;}

@media (max-width:600px){
  nav{padding:20px 24px;}
  main{padding:10px 20px 60px;}
  .err-cta{flex-direction:column; width:100%;}
  .err-cta .btn{width:100%; justify-content:center;}
}
</style>
